<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated SCRO @ UCF logo">
  <defs>
    <style>
      .pulse { animation: pulse 3.2s ease-in-out infinite; transform-origin: 256px 256px; }
      .trace { animation: glow 2.8s ease-in-out infinite; }
      @keyframes pulse {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      @keyframes glow {
        0%,100% { opacity: 0.8; }
        50% { opacity: 1; }
      }
    </style>
  </defs>
  <rect width="512" height="512" rx="110" fill="#000000"/>
  <g class="trace" stroke="#FFD51E" stroke-width="22" stroke-linecap="round">
    <path d="M84 136L120 108"/>
    <path d="M84 376L120 404"/>
    <path d="M428 136L392 108"/>
    <path d="M428 376L392 404"/>
  </g>
  <g class="pulse">
    <circle cx="84" cy="136" r="18" fill="#FFD51E"/>
    <circle cx="84" cy="376" r="18" fill="#FFD51E"/>
    <circle cx="428" cy="136" r="18" fill="#FFD51E"/>
    <circle cx="428" cy="376" r="18" fill="#FFD51E"/>
    <text x="256" y="280" text-anchor="middle" fill="#FFD51E" font-family="Inter, Arial, sans-serif" font-size="138" font-weight="800" letter-spacing="5">SCRO</text>
    <text x="256" y="328" text-anchor="middle" fill="#CCAA18" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">@ UCF</text>
  </g>
</svg>
